services:
  postgres:
    image: postgres:16
    container_name: mcp-study-postgres
    environment:
      POSTGRES_DB: mcp_study
      POSTGRES_USER: mcp_user
      POSTGRES_PASSWORD: mcp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
